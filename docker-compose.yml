version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       trackwise_db
      POSTGRES_USER:     trackwise
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django API ──────────────────────────────────────────
  api:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: trackwise_backend.settings.development
      DJANGO_SECRET_KEY:      dev-secret-key-change-in-production
      DJANGO_DEBUG:           'True'
      DB_NAME:                trackwise_db
      DB_USER:                trackwise
      DB_PASSWORD:            password
      DB_HOST:                db
      DB_PORT:                '5432'
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/1
      CORS_ALLOWED_ORIGINS:   'http://localhost:3000,exp://localhost:19000'
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────
  worker:
    build: .
    command: celery -A trackwise_backend worker --loglevel=info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: trackwise_backend.settings.development
      DJANGO_SECRET_KEY:      dev-secret-key-change-in-production
      DB_NAME:                trackwise_db
      DB_USER:                trackwise
      DB_PASSWORD:            password
      DB_HOST:                db
      DB_PORT:                '5432'
      CELERY_BROKER_URL:      redis://redis:6379/1
      REDIS_URL:              redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  pgdata:
